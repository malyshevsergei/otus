---
# Fill public IPs from: terraform -chdir=../terraform output
all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

  children:
    lb:
      hosts:
        lb:
          ansible_host: REPLACE_WITH_LB_PUBLIC_IP
          private_ip: "10.0.0.10"

    backends:
      hosts:
        backend-1:
          ansible_host: REPLACE_WITH_BACKEND1_PUBLIC_IP
          private_ip: "10.0.0.11"
        backend-2:
          ansible_host: REPLACE_WITH_BACKEND2_PUBLIC_IP
          private_ip: "10.0.0.12"
