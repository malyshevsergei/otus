---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Deploy load balancer upstream config
  template:
    src: upstream.conf.j2
    dest: /etc/nginx/conf.d/upstream.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload nginx

- name: Deploy load balancer virtual host
  template:
    src: lb.conf.j2
    dest: /etc/nginx/sites-available/lb.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload nginx

- name: Enable load balancer virtual host
  file:
    src: /etc/nginx/sites-available/lb.conf
    dest: /etc/nginx/sites-enabled/lb.conf
    state: link
  notify: reload nginx

- name: Ensure Nginx is started and enabled
  service:
    name: nginx
    state: started
    enabled: yes
