---
- name: Install MariaDB server
  apt:
    name:
      - mariadb-server
    state: present
    update_cache: yes

- name: Ensure MariaDB is started and enabled
  service:
    name: mariadb
    state: started
    enabled: yes

- name: Allow remote connections (bind to all interfaces)
  copy:
    dest: /etc/mysql/mariadb.conf.d/99-remote.cnf
    content: |
      [mysqld]
      bind-address = 0.0.0.0
    owner: root
    group: root
    mode: "0644"
  notify: restart mariadb

- name: Flush handlers so bind-address change takes effect
  meta: flush_handlers

- name: Create Joomla database
  command: >
    mysql -e
    "CREATE DATABASE IF NOT EXISTS {{ db_name }}
     CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
  changed_when: false

- name: Create Joomla database user
  command: >
    mysql -e
    "CREATE USER IF NOT EXISTS '{{ db_user }}'@'10.0.0.%'
     IDENTIFIED BY '{{ db_password }}';"
  changed_when: false

- name: Grant all privileges to Joomla user
  command: >
    mysql -e
    "GRANT ALL PRIVILEGES ON {{ db_name }}.* TO '{{ db_user }}'@'10.0.0.%';
     FLUSH PRIVILEGES;"
  changed_when: false
