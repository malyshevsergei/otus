---
# Global variables for all hosts

# Database connection (shared across backend servers)
db_host: "{{ hostvars[groups['database'][0]]['internal_ip'] }}"
db_name: "webapp_db"
db_user: "webapp_user"
db_password: "changeme_secure_password"  # Change this in production!
db_port: "5432"

# Application settings
app_name: "webapp"
app_user: "nginx"
app_group: "nginx"

# Django settings
django_secret_key: "django-insecure-change-me-in-production"
django_debug: "False"
django_allowed_hosts: "*"

# NFS settings
nfs_device: "/dev/vdb"
nfs_mount_point: "/var/www/static"

# Static and media paths
static_dir: "/var/www/static"
media_dir: "/var/www/media"
