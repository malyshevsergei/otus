---
# GFS2 cluster setup for shared storage

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install GFS2 and cluster packages
  apt:
    name:
      - gfs2-utils
      - dlm
      - pacemaker
      - corosync
      - pcs
    state: present

- name: Configure /etc/hosts for cluster communication
  blockinfile:
    path: /etc/hosts
    block: |
      {% for host in groups['backend'] %}
      {{ hostvars[host]['internal_ip'] }} {{ hostvars[host]['inventory_hostname'] }}
      {% endfor %}
    marker: "# {mark} ANSIBLE MANAGED BLOCK - GFS2 Cluster"

- name: Set password for hacluster user
  user:
    name: hacluster
    password: "{{ 'hacluster' | password_hash('sha512') }}"
    state: present

- name: Start and enable pcsd service
  service:
    name: pcsd
    state: started
    enabled: yes

- name: Authenticate cluster nodes (only on first node)
  shell: |
    pcs host auth {% for host in groups['backend'] %}{{ hostvars[host]['inventory_hostname'] }} {% endfor %}-u hacluster -p hacluster
  when: inventory_hostname == groups['backend'][0]
  run_once: true
  ignore_errors: yes

- name: Create cluster (only on first node)
  shell: |
    pcs cluster setup {{ gfs2_cluster_name }} {% for host in groups['backend'] %}{{ hostvars[host]['inventory_hostname'] }} {% endfor %}--force
  when: inventory_hostname == groups['backend'][0]
  run_once: true
  ignore_errors: yes

- name: Start cluster (only on first node)
  shell: pcs cluster start --all
  when: inventory_hostname == groups['backend'][0]
  run_once: true
  ignore_errors: yes

- name: Enable cluster at boot
  shell: pcs cluster enable --all
  when: inventory_hostname == groups['backend'][0]
  run_once: true
  ignore_errors: yes

- name: Wait for cluster to be ready
  wait_for:
    timeout: 30
  delegate_to: localhost

- name: Create DLM resource (only on first node)
  shell: |
    pcs resource create dlm systemd:dlm op monitor interval=30s on-fail=ignore clone interleave=true ordered=true
  when: inventory_hostname == groups['backend'][0]
  run_once: true
  ignore_errors: yes

- name: Format GFS2 filesystem (only on first node)
  shell: |
    if ! blkid {{ gfs2_device }} | grep -q gfs2; then
      mkfs.gfs2 -O -j{{ groups['backend']|length }} -p lock_dlm -t {{ gfs2_cluster_name }}:{{ gfs2_lock_table }} {{ gfs2_device }}
    fi
  when: inventory_hostname == groups['backend'][0]
  run_once: true

- name: Create mount point
  file:
    path: "{{ gfs2_mount_point }}"
    state: directory
    mode: '0755'

- name: Mount GFS2 filesystem
  mount:
    path: "{{ gfs2_mount_point }}"
    src: "{{ gfs2_device }}"
    fstype: gfs2
    opts: noatime,nodiratime
    state: mounted

- name: Set permissions on shared storage
  file:
    path: "{{ gfs2_mount_point }}"
    owner: www-data
    group: www-data
    mode: '0755'
    state: directory
