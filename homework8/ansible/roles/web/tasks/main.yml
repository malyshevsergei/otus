---
- name: Wait for apt/dpkg locks to be released
  shell: |
    while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1; do
      sleep 3
    done
  changed_when: false
  timeout: 300

- name: Install nginx and PHP packages
  apt:
    name:
      - nginx
      - php8.1-fpm
      - php8.1-mysql
      - php8.1-curl
      - php8.1-gd
      - php8.1-xml
      - php8.1-mbstring
      - php8.1-zip
      - php8.1-intl
      - mariadb-server
      - python3-pymysql
    state: present

- name: Start and enable services
  systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - nginx
    - php8.1-fpm
    - mariadb

- name: Create WordPress database
  mysql_db:
    name: "{{ wp_db_name }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Create WordPress database user
  mysql_user:
    name: "{{ wp_db_user }}"
    password: "{{ wp_db_password }}"
    priv: "{{ wp_db_name }}.*:ALL"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Create web root directory
  file:
    path: /var/www/html/wordpress
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Download WordPress
  get_url:
    url: https://wordpress.org/latest.tar.gz
    dest: /tmp/wordpress.tar.gz
    timeout: 60

- name: Extract WordPress
  unarchive:
    src: /tmp/wordpress.tar.gz
    dest: /var/www/html/
    remote_src: yes
    owner: www-data
    group: www-data
    creates: /var/www/html/wordpress/wp-login.php

- name: Create wp-config.php
  template:
    src: wp-config.php.j2
    dest: /var/www/html/wordpress/wp-config.php
    owner: www-data
    group: www-data
    mode: "0640"

- name: Create WordPress log directory
  file:
    path: /var/log/wordpress
    state: directory
    owner: www-data
    group: adm
    mode: "0750"

- name: Configure nginx for WordPress
  template:
    src: nginx-site.conf.j2
    dest: /etc/nginx/sites-available/wordpress
    mode: "0644"
  notify: reload nginx

- name: Enable nginx site
  file:
    src: /etc/nginx/sites-available/wordpress
    dest: /etc/nginx/sites-enabled/wordpress
    state: link
  notify: reload nginx

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Ensure nginx log directory exists
  file:
    path: /var/log/nginx
    state: directory
    owner: www-data
    group: adm
    mode: "0755"

- name: Generate some nginx access logs (for testing)
  shell: |
    for i in $(seq 1 50); do
      curl -s http://localhost/ -o /dev/null || true
      curl -s http://localhost/wp-login.php -o /dev/null || true
      sleep 0.1
    done
  changed_when: false
  ignore_errors: yes
