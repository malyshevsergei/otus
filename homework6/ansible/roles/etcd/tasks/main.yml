---
- name: Download etcd {{ etcd_version }}
  get_url:
    url: "https://github.com/etcd-io/etcd/releases/download/v{{ etcd_version }}/etcd-v{{ etcd_version }}-linux-amd64.tar.gz"
    dest: /tmp/etcd.tar.gz

- name: Extract etcd
  unarchive:
    src: /tmp/etcd.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Install etcd binaries
  copy:
    src: "/tmp/etcd-v{{ etcd_version }}-linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: '0755'
    remote_src: yes
  loop:
    - etcd
    - etcdctl
    - etcdutl

- name: Create etcd user
  user:
    name: etcd
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Create etcd data directory
  file:
    path: /var/lib/etcd
    state: directory
    owner: etcd
    group: etcd
    mode: '0700'

- name: Deploy etcd systemd unit
  template:
    src: etcd.service.j2
    dest: /etc/systemd/system/etcd.service
  notify: Restart etcd

- name: Start and enable etcd
  systemd:
    name: etcd
    state: started
    enabled: yes
    daemon_reload: yes

- name: Wait for etcd to be healthy
  command: >
    etcdctl endpoint health
    --endpoints=http://{{ patroni_node_ip }}:{{ etcd_client_port }}
  register: etcd_health
  retries: 10
  delay: 5
  until: etcd_health.rc == 0
  changed_when: false
