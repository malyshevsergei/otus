---
all:
  children:
    mysql_cluster:
      hosts:
        mysql-node-1:
          ansible_host: 178.154.225.249  # Замените на реальный IP
          mysql_server_id: 1
          mysql_port: 3311
          mysql_x_port: 33061

        # Для нескольких VM раскомментируйте:
        # mysql-node-2:
        #   ansible_host: 192.168.1.11
        #   mysql_server_id: 2
        #   mysql_port: 3312
        #   mysql_x_port: 33062

        # mysql-node-3:
        #   ansible_host: 192.168.1.12
        #   mysql_server_id: 3
        #   mysql_port: 3313
        #   mysql_x_port: 33063

      vars:
        # MySQL Cluster Configuration
        mysql_root_password: "rootpass"
        mysql_cluster_admin: "clusteradmin"
        mysql_cluster_password: "clusterpass"
        mysql_app_user: "appuser"
        mysql_app_password: "apppass"
        mysql_cluster_name: "myCluster"

        # Docker Configuration
        docker_compose_version: "2.24.0"

        # Network Configuration
        mysql_cluster_subnet: "172.20.0.0/16"
