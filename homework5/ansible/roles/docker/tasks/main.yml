---
- name: Check if Docker is already installed
  shell: which docker
  register: docker_installed
  ignore_errors: yes
  changed_when: false
  failed_when: false

- name: Debug Docker check
  debug:
    msg: "Docker check result: rc={{ docker_installed.rc }}, stdout={{ docker_installed.stdout }}"

- name: Install Docker
  block:
    - name: Remove old Docker versions
      apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        update_cache: yes

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is started and enabled
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ project_user }}"
        groups: docker
        append: yes

    - name: Install Docker Python library
      pip:
        name:
          - docker
          - docker-compose
        state: present

  when: docker_installed.rc != 0

- name: Verify Docker installation
  command: docker --version
  register: docker_version_output
  changed_when: false
  failed_when: false
  ignore_errors: yes

- name: Display Docker version
  debug:
    msg: "Docker installed: {{ docker_version_output.stdout }}"

- name: Verify Docker Compose installation
  command: docker compose version
  register: compose_version_output
  changed_when: false

- name: Display Docker Compose version
  debug:
    msg: "Docker Compose installed: {{ compose_version_output.stdout }}"

- name: Test Docker
  docker_container:
    name: test-container
    image: hello-world
    state: started
    auto_remove: yes
  register: docker_test
  ignore_errors: yes

- name: Docker test result
  debug:
    msg: "Docker is working correctly"
  when: docker_test is succeeded
