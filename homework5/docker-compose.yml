version: '3.8'

services:
  mysql-server-1:
    image: mysql/mysql-server:8.0
    container_name: mysql-server-1
    hostname: mysql-server-1
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql-server-1-data:/var/lib/mysql
      - ./config/my.cnf:/etc/my.cnf
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      mysql-cluster:
        ipv4_address: 172.20.0.11
    ports:
      - "3311:3306"
      - "33061:33060"
    command: ["mysqld", "--server-id=1", "--log-bin=mysql-bin", "--gtid-mode=ON", "--enforce-gtid-consistency=ON", "--binlog-checksum=NONE"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-server-2:
    image: mysql/mysql-server:8.0
    container_name: mysql-server-2
    hostname: mysql-server-2
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql-server-2-data:/var/lib/mysql
      - ./config/my.cnf:/etc/my.cnf
    networks:
      mysql-cluster:
        ipv4_address: 172.20.0.12
    ports:
      - "3312:3306"
      - "33062:33060"
    command: ["mysqld", "--server-id=2", "--log-bin=mysql-bin", "--gtid-mode=ON", "--enforce-gtid-consistency=ON", "--binlog-checksum=NONE"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mysql-server-1:
        condition: service_healthy

  mysql-server-3:
    image: mysql/mysql-server:8.0
    container_name: mysql-server-3
    hostname: mysql-server-3
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql-server-3-data:/var/lib/mysql
      - ./config/my.cnf:/etc/my.cnf
    networks:
      mysql-cluster:
        ipv4_address: 172.20.0.13
    ports:
      - "3313:3306"
      - "33063:33060"
    command: ["mysqld", "--server-id=3", "--log-bin=mysql-bin", "--gtid-mode=ON", "--enforce-gtid-consistency=ON", "--binlog-checksum=NONE"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mysql-server-1:
        condition: service_healthy

  mysql-shell:
    image: mysql/mysql-server:8.0
    container_name: mysql-shell
    hostname: mysql-shell
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    networks:
      mysql-cluster:
        ipv4_address: 172.20.0.10
    volumes:
      - ./scripts:/scripts
    depends_on:
      mysql-server-1:
        condition: service_healthy
      mysql-server-2:
        condition: service_healthy
      mysql-server-3:
        condition: service_healthy
    entrypoint: /bin/bash
    command: -c "tail -f /dev/null"

  mysql-router:
    image: mysql/mysql-router:8.0
    container_name: mysql-router
    hostname: mysql-router
    environment:
      MYSQL_HOST: mysql-server-1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpass
      MYSQL_INNODB_CLUSTER_MEMBERS: 3
    networks:
      mysql-cluster:
        ipv4_address: 172.20.0.20
    ports:
      - "6446:6446"
      - "6447:6447"
    depends_on:
      mysql-server-1:
        condition: service_healthy
      mysql-server-2:
        condition: service_healthy
      mysql-server-3:
        condition: service_healthy

networks:
  mysql-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql-server-1-data:
  mysql-server-2-data:
  mysql-server-3-data:
